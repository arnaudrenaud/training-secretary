name: Refresh Garmin tokens
on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install garth
      - name: Generate tokens
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python - <<'EOF'
          import garth, json
          from dataclasses import asdict
          import os
          garth.login(os.environ["GARMIN_EMAIL"], os.environ["GARMIN_PASSWORD"])
          with open("oauth1_token.json", "w") as f:
              json.dump(asdict(garth.client.oauth1_token), f)
          with open("oauth2_token.json", "w") as f:
              json.dump(asdict(garth.client.oauth2_token), f)
          print("Tokens generated successfully.")
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-tokens
          path: |
            oauth1_token.json
            oauth2_token.json
          retention-days: 1
